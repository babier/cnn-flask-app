<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CNN Image Classifier</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }
        .card {
            border-radius: 15px;
        }
        .preview-img {
            max-width: 100%;
            border-radius: 10px;
            margin-top: 15px;
        }
    </style>
</head>

<body>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow p-4">
                <h3 class="text-center mb-4">CNN Image Classifier</h3>

                <form method="POST" enctype="multipart/form-data">
                    <div class="mb-3">
                        <input class="form-control" type="file" name="file" required>
                    </div>

                    <div class="d-grid">
                        <button class="btn btn-primary mb-2">Prediksi</button>
                        <a href="/" class="btn btn-secondary">Clean</a>
                    </div>
                </form>

                

                {% if image %}
                    <div class="text-center">
                        <img src="{{ image }}" class="preview-img">
                    </div>
                {% endif %}

                {% if prediction %}
                    <div class="alert alert-success mt-3 text-center">
                        <h5>Hasil: <b>{{ prediction }}</b></h5>
                        {% if confidence %}
                            <p>Confidence: {{ (confidence * 100) | round(2) }}%</p>
                        {% endif %}
                    </div>
                {% endif %}

            </div>

        </div>
    </div>
</div>

</body>
</html>
